<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker - PesaPal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <img src="logo.png" alt="PesaPal Logo">
                <div class="logo-text">
                    <h1>PesaPal</h1>
                    <p>Student expense tracker</p>
                </div>
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="tracker.html" class="active">Tracker</a>
                <a href="summary.html">Summary</a>
            </nav>
            <!-- In tracker.html, update the nav -->

        </div>
    </header>

    <main class="container">
        <div class="tracker-grid">
            
            <!-- Budget Card -->
            <article class="card">
                <h2>Set Your Budget</h2>
                <form id="budgetForm">
                    <div class="form-group">
                        <label for="budgetInput">Monthly Budget (KSH)</label>
                        <input type="number" id="budgetInput" placeholder="e.g. 5000" min="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Set Budget</button>
                </form>
            </article>

            <!-- Add Expense Card -->
            <article class="card">
                <h2>Add Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="descInput">Description</label>
                        <input type="text" id="descInput" placeholder="e.g. Lunch at cafeteria" required>
                    </div>
                    <div class="form-group">
                        <label for="amountInput">Amount (KSH)</label>
                        <input type="number" id="amountInput" placeholder="e.g. 200" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="categoryInput">Category</label>
                        <select id="categoryInput">
                            <option>Food</option>
                            <option>Transport</option>
                            <option>Books</option>
                            <option>Entertainment</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Expense</button>
                </form>
            </article>

            <!-- Summary Card -->
            <article class="card">
                <h2>Your Summary</h2>
                <div class="stat-row">
                    <span>Budget:</span>
                    <strong id="budgetTotal">KSH 0</strong>
                </div>
                <div class="stat-row">
                    <span>Spent:</span>
                    <strong id="budgetSpent">KSH 0</strong>
                </div>
                <div class="stat-row">
                    <span>Remaining:</span>
                    <strong id="budgetLeft">KSH 0</strong>
                </div>
                
                <div class="progress-bg">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>

                <div id="alertBox" class="alert alert-info">
                    Set a budget to start tracking your spending.
                </div>
            </article>

        </div>

        <!-- Expense Table -->
        <section class="table-container">
            <h2>Recent Expenses</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody id="expenseTable">
                    <tr>
                        <td colspan="4" class="empty-message">No expenses recorded yet</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
